name: Build release APK for default

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk-default:
    name: Generate release APK for GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu
          cache: gradle
      - name: chmod gradlew
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDefaultRelease --stacktrace
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Sign APK
        # ID used to access action output
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/default/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_ALIAS_PASSWORD }}
        env:
          # override default build-tools version (29.0.3) -- optional
          BUILD_TOOLS_VERSION: "34.0.0"
      - name: Rename APK
        run: mv ${{steps.sign_apk.outputs.signedReleaseFile}} release.apk
      - run: echo "Build status report=${{ job.status }}."
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release.apk
          path: release.apk
      - name: Release on Summit
        uses: softprops/action-gh-release@v1
        with:
          files: release.apk
      - name: Release on Summit with Lemmy
        uses: softprops/action-gh-release@v1
        with:
          repository: idunnololz/summit-for-lemmy
          token: ${{ secrets.GH_TOKEN }}
          files: release.apk

  create-fdroid-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}        # v1.0.0
          VERSION=${TAG#v}                     # 1.0.0
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=release-${VERSION}-fdroid" >> $GITHUB_OUTPUT
          echo "fdroid_tag=${TAG}-fd" >> $GITHUB_OUTPUT

      - name: Create branch
        run: |
          git checkout -b ${{ steps.version.outputs.branch }}

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "chore: F-Droid release ${{ steps.version.outputs.fdroid_tag }}"

      - name: Create F-Droid tag
        run: |
          git tag -a ${{ steps.version.outputs.fdroid_tag }} -m "F-Droid Release ${{ steps.version.outputs.fdroid_tag }}"

      - name: Push branch and tag
        run: |
          git push origin ${{ steps.version.outputs.branch }}
          git push origin ${{ steps.version.outputs.fdroid_tag }}